<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liyengwas — Senior Full-Stack Engineer</title>
  <meta name="description" content="Portfolio of Liyengwas — Senior Full-Stack Developer specializing in Laravel, Vue.js, Flutter, and M-Pesa payment integrations for the East African market." />

  <!-- Display / body / mono typefaces referenced in tailwind.config.js -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />


  <script>
    (function () {
      try {
        var raw = localStorage.getItem('portfolio-theme-v1');
        if (!raw) return;
        var saved = JSON.parse(raw);
        var mode = saved.mode || 'dark';
        var c = (saved.colors && saved.colors[mode]) || null;
        if (!c) return;

        function hexToRgb(hex) {
          var clean = hex.replace('#', '');
          if (clean.length === 3) clean = clean.split('').map(function (ch) { return ch + ch }).join('');
          var num = parseInt(clean, 16);
          return [(num >> 16) & 255, (num >> 8) & 255, num & 255];
        }
        function triplet(rgb) { return rgb.join(' '); }
        function shade(hex, amount, towards) {
          var rgb = hexToRgb(hex);
          return rgb.map(function (ch) { return Math.round(ch + (towards - ch) * amount); });
        }
        function mix(hexA, hexB, ratio) {
          var a = hexToRgb(hexA), b = hexToRgb(hexB);
          return a.map(function (ch, i) { return Math.round(ch + (b[i] - ch) * ratio); });
        }

        var root = document.documentElement.style;
        root.setProperty('--color-bg', triplet(hexToRgb(c.bg)));
        root.setProperty('--color-bg-light', triplet(shade(c.bg, 0.06, 255)));
        root.setProperty('--color-surface', triplet(hexToRgb(c.surface)));
        root.setProperty('--color-surface-light', triplet(shade(c.surface, 0.08, 255)));
        root.setProperty('--color-surface-dark', triplet(shade(c.surface, 0.1, 0)));
        root.setProperty('--color-text', triplet(hexToRgb(c.text)));
        root.setProperty('--color-text-muted', triplet(hexToRgb(c.textMuted)));
        root.setProperty('--color-text-faint', triplet(mix(c.textMuted, c.bg, 0.35)));
        root.setProperty('--color-accent', triplet(hexToRgb(c.accent)));
        root.setProperty('--color-accent-soft', triplet(shade(c.accent, 0.18, 255)));
        document.documentElement.style.colorScheme = mode;
        document.documentElement.setAttribute('data-theme', mode);
      } catch (e) {
        /* no-op — CSS fallback vars in style.css cover this case */
      }
    })();
  </script>
</head>
<body class="bg-midnight">
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
